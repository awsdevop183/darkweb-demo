version: '3.8'

services:
  app:
    build: ./app
    container_name: nexusmarket-app
    restart: unless-stopped
    environment:
      - ADMIN_PASSWORD=nexus2026
    volumes:
      - market-data:/data
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: nexusmarket-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "127.0.0.1:80:80"
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge

volumes:
  market-data:
